name: Test_XG_040G_MD_Optimized

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
      use_prebuilt:
        description: "Use pre-built toolchain and imagebuilder"
        required: false
        default: true
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default-main
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Download pre-built artifacts
        if: ${{ github.event.inputs.use_prebuilt == 'true' }}
        run: |
          echo "Downloading pre-built artifacts..."
          mkdir -p prebuilt
          
          # Download toolchain and imagebuilder from previous builds
          # Set these URLs as GitHub secrets or workflow variables
          wget -O prebuilt/openwrt-toolchain.tar.gz "${PREBUILT_TOOLCHAIN_URL}" || \
            echo "Warning: Could not download prebuilt toolchain"
          wget -O prebuilt/openwrt-imagebuilder-airoha-an7581.Linux-x86_64.tar.zst "${PREBUILT_IMAGEBUILDER_URL}" || \
            echo "Warning: Could not download prebuilt imagebuilder"
          
          ls -la prebuilt/

      - name: Clone OpenWrt build environment and apply patches
        run: |
          # 克隆 OpenWrt 构建环境
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          
          # 进入 openwrt 目录
          cd openwrt
          
          # 修复内核版本配置
          if [ -d "target/linux/generic" ]; then
            # 检查内核版本文件
            KERNEL_VERSION=$(ls target/linux/generic/kernel-* 2>/dev/null | head -1)
            if [ -z "$KERNEL_VERSION" ]; then
              # 创建默认内核版本文件（适配 OpenWrt 23.05+）
              echo "CONFIG_KERNEL_6_1=y" > target/linux/generic/kernel-6.1
              echo "Kernel version file created for 6.1"
            fi
          fi
          
          # 应用补丁
          [ -e ../patch/airoha/01_leds ] && cp -f ../patch/airoha/01_leds target/linux/airoha/an7581/base-files/etc/board.d/01_leds
          [ -e ../patch/airoha/02_network ] && cp -f ../patch/airoha/02_network target/linux/airoha/an7581/base-files/etc/board.d/02_network
          [ -e ../patch/airoha/an7581.mk ] && cp -f ../patch/airoha/an7581.mk target/linux/airoha/image/an7581.mk
          [ -e ../patch/airoha/an7581-nokia_xg-040g-md.dts ] && cp -f ../patch/airoha/an7581-nokia_xg-040g-md.dts target/linux/airoha/dts/an7581-nokia_xg-040g-md.dts
          [ -d "../patch/airoha/patches-6.12" ] && cp -f ../patch/airoha/patches-6.12/*.patch target/linux/airoha/patches-6.12/
          [ -d "../patch/mediatek/patches-6.12" ] && cp -f ../patch/mediatek/patches-6.12/*.patch target/linux/mediatek/patches-6.12/
          [ -d "../patch/generic/pending-6.12" ] && find ../patch/generic/pending-6.12/ -name "*.patch" ! -name "499-mtd-spinand-FudanMicro-FM25G02B.patch" -exec cp -f {} target/linux/generic/pending-6.12/ \;
          
          # 复制配置文件到构建环境
          cp -fv "../${CONFIG_FILE}" .config
          
          # 验证配置文件
          if [ ! -f ".config" ]; then
            echo "Error: Config file not copied to openwrt directory"
            exit 1
          fi
          
          echo "OpenWrt build environment ready"
          echo "Makefile: $(test -f Makefile && echo 'FOUND' || echo 'MISSING')"
          echo "Config: $(test -f .config && echo 'FOUND' || echo 'MISSING')"
          echo "Kernel version: $(ls target/linux/generic/kernel-* 2>/dev/null | head -1 || echo 'NOT FOUND')"

      - name: Update feeds (minimal)
        working-directory: ./openwrt
        run: |
          if [ -e ../$FEEDS_CONF ]; then
            cp -f ../$FEEDS_CONF ./feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install luasrcdiet luci-base luci-mod-admin-full

      - name: Use ImageBuilder for fast firmware generation
        if: ${{ github.event.inputs.use_prebuilt == 'true' }}
        run: |
          echo "=== Using ImageBuilder for fast firmware generation ==="
          
          if [ -f "prebuilt/openwrt-imagebuilder-airoha-an7581.Linux-x86_64.tar.zst" ]; then
            tar -I zstd -xf prebuilt/openwrt-imagebuilder-airoha-an7581.Linux-x86_64.tar.zst
            IMAGEBUILDER_DIR=$(ls -d *imagebuilder* 2>/dev/null | head -1)
            
            if [ -n "$IMAGEBUILDER_DIR" ]; then
              cd $IMAGEBUILDER_DIR
              cp -fv "../${CONFIG_FILE}" .config
              
              echo "Building firmware with ImageBuilder..."
              make image PROFILE=nokia_xg-040g-md -j$(nproc) V=s 2>&1 | tee build.log
              
              echo "FIRMWARE_DIR=$PWD/bin" >> $GITHUB_ENV
              ls -la bin/
            else
              echo "Error: Could not find ImageBuilder directory"
              exit 1
            fi
          else
            echo "Error: ImageBuilder tarball not found"
            exit 1
          fi

      - name: Compile from source (fallback)
        working-directory: ./openwrt    # ✅ 关键修复：确保在 openwrt 目录编译
        if: ${{ github.event.inputs.use_prebuilt != 'true' }}
        run: |
          echo "=== Compiling from source (fallback mode) ==="
          
          # 验证 Makefile 存在
          if [ ! -f "Makefile" ]; then
            echo "Error: Makefile not found in openwrt directory"
            echo "Directory contents:"
            ls -la
            exit 1
          fi
          
          # 验证配置文件存在（已经在 Clone 步骤中复制）
          if [ ! -f ".config" ]; then
            echo "Error: .config not found, copying from parent directory"
            cp -fv "../${CONFIG_FILE}" .config
          fi
          
          echo "Starting OpenWrt compilation..."
          make -j2 V=s 2>&1 | tee build.log
          
          # 检查编译结果
          if [ $? -ne 0 ]; then
            echo "Compilation failed. Check build.log for details."
            exit 1
          fi
          
          # 查找固件文件
          FIRMWARE_FILES=$(find bin -type f \( -name "*.bin" -o -name "*.img" \) 2>/dev/null)
          if [ -n "$FIRMWARE_FILES" ]; then
            echo "FIRMWARE_DIR=$PWD/bin" >> $GITHUB_ENV
            echo "Found firmware files: $FIRMWARE_FILES"
          else
            echo "Error: No firmware files found"
            exit 1
          fi

      - name: Collect build artifacts
        if: ${{ github.event.inputs.use_prebuilt != 'true' }}
        run: |
          echo "=== Collecting build artifacts for reuse ==="
          cd openwrt
          mkdir -p $GITHUB_WORKSPACE/artifacts
          
          # Collect toolchain
          find staging_dir -type d -name "*toolchain*" 2>/dev/null | head -1 | while read tc; do
            if [ -n "$tc" ]; then
              tar -czf $GITHUB_WORKSPACE/artifacts/openwrt-toolchain.tar.gz "$tc"
              echo "Toolchain collected: $tc"
            fi
          done
          
          # Collect ImageBuilder
          find . -type f -name "*imagebuilder*.tar.gz" 2>/dev/null | head -5 | while read file; do
            cp "$file" $GITHUB_WORKSPACE/artifacts/
            echo "ImageBuilder collected: $file"
          done
          
          ls -la $GITHUB_WORKSPACE/artifacts/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware_${{ env.DEVICE_NAME }}_$(date +'%Y%m%d%H%M')
          path: ${{ env.FIRMWARE_DIR }}/*

      - name: Fix translations
        run: |
          cd openwrt/feeds/luci/applications/luci-app-cups
          make pot
          make lang

      - name: Upload build artifacts for reuse
        uses: actions/upload-artifact@v6
        if: ${{ github.event.inputs.use_prebuilt != 'true' }}
        with:
          name: OpenWrt_build_artifacts
          path: artifacts/*
          # Explicitly zip directories to fix upload issues
          if-no-files-found: error

      - name: Generate release notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🧪 Test OpenWrt firmware for XG-040G-MD
          ----------------------
          **Optimized build using ImageBuilder**
          
          Device: XG-040G-MD
          Build time: $(date +"%Y-%m-%d %H:%M")
          Build method: ${{ github.event.inputs.use_prebuilt == 'true' && 'ImageBuilder' || 'Source Compilation' }}
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}-test
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE_DIR }}/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}