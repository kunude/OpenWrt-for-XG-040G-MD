name: Build_XG_040G_MD

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  # REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default-main
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code and apply XG-040G-MD patch files
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          cd patch
          [ -e airoha/01_leds ] && cp -f airoha/01_leds ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/01_leds
          [ -e airoha/02_network ] && cp -f airoha/02_network ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network
          [ -e airoha/an7581.mk ] && cp -f airoha/an7581.mk ../openwrt/target/linux/airoha/image/an7581.mk
          [ -e airoha/an7581-nokia_xg-040g-md.dts ] && cp -f airoha/an7581-nokia_xg-040g-md.dts ../openwrt/target/linux/airoha/dts/an7581-nokia_xg-040g-md.dts
          [ -d "airoha/patches-6.12" ] && cp -f airoha/patches-6.12/*.patch ../openwrt/target/linux/airoha/patches-6.12/
          [ -d "mediatek/patches-6.12" ] && cp -f mediatek/patches-6.12/*.patch ../openwrt/target/linux/mediatek/patches-6.12/
          # 方案2: 跳过损坏的补丁文件 499-mtd-spinand-FudanMicro-FM25G02B.patch
          [ -d "generic/pending-6.12" ] && find generic/pending-6.12/ -name "*.patch" ! -name "499-mtd-spinand-FudanMicro-FM25G02B.patch" -exec cp -f {} ../openwrt/target/linux/generic/pending-6.12/ \;


      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          if [ -e ../$FEEDS_CONF ]; then
            cp -f ../$FEEDS_CONF ./feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f
          # ./scripts/feeds install \
          #   airoha-en7581-npu-firmware \
          #   apk \
          #   dnsmasq \
          #   dropbear \
          #   firewall4 \
          #   fstools \
          #   ip-full \
          #   kmod-gpio-button-hotplug \
          #   kmod-i2c-an7581 \
          #   kmod-leds-gpio \
          #   kmod-phy-airoha-en8811h \
          #   logd \
          #   mtd \
          #   netifd \
          #   odhcp6c \
          #   odhcpd-ipv6only \
          #   ppp \
          #   ppp-mod-pppoe \
          #   procd \
          #   uci \
          #   uclient-fetch \
          #   uboot-envtools \
          #   ubi-utils \
          #   urandom-seed \
          #   urngd \
          #   usign \
          #   umdns \
          #   luci \
          #   luci-base \
          #   luci-mod-admin-full \
          #   luci-ssl

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware (组合方案)
        id: compile
        run: |
          cd openwrt
          
          # === 方案2: 编译过程修正 ===
          
          # 1. 备份原始配置
          cp .config .config.backup
          echo "=== 编译前配置检查 ==="
          grep -E "^CONFIG_TARGET" .config | head -10
          
          # 2. 确保固件生成配置正确
          echo "=== 确保固件生成配置 ==="
          if grep -q "CONFIG_TARGET_ROOTFS_SQUASHFS=y" .config; then
            echo "✅ ROOTFS 配置已启用"
          else
            echo "❌ 缺少 ROOTFS 配置，添加..."
            echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          fi
          
          # 3. 验证设备配置
          echo "=== 验证设备配置 ==="
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "✅ 设备名称: $DEVICE_NAME"
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          else
            echo "❌ 未找到设备配置!"
            exit 1
          fi
          
          # 4. 编译固件（详细模式）
          echo "=== 开始编译固件 ==="
          make -j1 V=s 2>&1 | tee build.log
          
          # 5. 检查编译结果
          if [ $? -ne 0 ]; then
            echo "=== 编译失败 - 显示最后100行 ==="
            tail -100 build.log
            exit 1
          fi
          
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          
          # === 方案1: 固件生成验证 ===
          
          echo "=== 固件生成验证 ==="
          
          # 1. 检查编译日志中的错误
          echo "检查编译错误..."
          grep -i "error\|failed" build.log | tail -30
          
          # 2. 检查固件相关输出
          echo "检查固件相关输出..."
          grep -i "firmware\|image\|bin\|img" build.log | tail -30
          
          # 3. 检查配置是否被修改
          if ! diff .config .config.backup > /dev/null; then
            echo "⚠️  配置文件在编译过程中被修改！"
            diff .config .config.backup | head -20
          fi
          
          # 4. 查找固件文件
          echo "查找固件文件..."
          FIRMWARE_FILES=$(find bin -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" \) 2>/dev/null)
          if [ -n "$FIRMWARE_FILES" ]; then
            echo "✅ 找到固件文件:"
            echo "$FIRMWARE_FILES" | head -20
          else
            echo "❌ 未找到固件文件！"
            echo "固件目录内容:"
            ls -la bin/targets/ 2>/dev/null || echo "固件目录不存在"
            find bin -type f 2>/dev/null | head -10
            exit 1
          fi

      - name: Debug firmware path (方案1+2组合验证)
        run: |
          echo "=== 方案1+2组合验证 ==="
          
          # === 方案2: 路径调试 ===
          echo "--- 方案2: 检查固件生成路径 ---"
          
          # 列出所有可能的固件目录
          echo "目标目录结构:"
          ls -la openwrt/bin/targets/ 2>/dev/null || echo "targets目录不存在"
          
          # 查找所有子目录
          echo "子目录结构:"
          for dir in openwrt/bin/targets/*/; do
            if [ -d "$dir" ]; then
              echo "目录: $dir"
              ls -la "$dir" 2>/dev/null | head -10
            fi
          done
          
          # 按架构查找
          echo "按架构查找:"
          for arch in airoha mediatek rockchip arm64 x86; do
            if [ -d "openwrt/bin/targets/$arch" ]; then
              echo "架构 $arch:"
              ls -la "openwrt/bin/targets/$arch/"
            fi
          done
          
          # === 方案1: 详细验证 ===
          echo "--- 方案1: 详细固件验证 ---"
          
          # 查找固件文件
          echo "固件文件查找:"
          find openwrt/bin -type f \( -name "*.bin" -o -name "*.img" -o -name "*firmware*" -o -name "*image*" \) 2>/dev/null | head -20
          
          # 检查环境变量
          echo "环境变量检查:"
          echo "DEVICE_NAME: ${DEVICE_NAME:-未设置}"
          echo "CONFIG_FILE: $CONFIG_FILE"
          
          # 验证设备配置
          echo "设备配置验证:"
          if [ -n "$DEVICE_NAME" ]; then
            echo "设备名称: $DEVICE_NAME"
            echo "尝试路径: openwrt/bin/targets/*/*$DEVICE_NAME*"
            ls -la openwrt/bin/targets/*/*"$DEVICE_NAME"* 2>/dev/null | head -10
          fi
          
          # 强制验证固件生成
          FIRMWARE_COUNT=$(find openwrt/bin -name "*.bin" -o -name "*.img" 2>/dev/null | wc -l)
          if [ "$FIRMWARE_COUNT" -eq 0 ]; then
            echo "❌ 错误: 固件未生成！"
            exit 1
          else
            echo "✅ 固件生成验证通过，找到 $FIRMWARE_COUNT 个固件文件"
          fi

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          # 添加路径调试信息
          echo "=== 调试固件生成路径 ==="
          ls -la openwrt/bin/targets/
          ls -la openwrt/bin/targets/*/ 2>/dev/null || echo "目标路径未找到"
          
          # 智能检测固件路径
          FIRMWARE_PATH=""
          for pattern in "airoha/an7581" "mediatek/filogic" "airoha/nokia_xg-040g-md" "mediatek/nokia_xg-040g-md"; do
            if [ -d "openwrt/bin/targets/$pattern" ]; then
              FIRMWARE_PATH="openwrt/bin/targets/$pattern"
              echo "找到固件路径: $FIRMWARE_PATH"
              break
            fi
          done
          
          # 如果未找到，尝试查找包含固件的目录
          if [ -z "$FIRMWARE_PATH" ]; then
            echo "未找到标准固件路径，尝试查找文件..."
            find openwrt/bin -name "*.bin" -o -name "*.img" 2>/dev/null | head -5
            
            # 使用第一个找到的目录
            FIRST_DIR=$(find openwrt/bin/targets -type d -maxdepth 2 2>/dev/null | head -1)
            if [ -n "$FIRST_DIR" ]; then
              FIRMWARE_PATH="$FIRST_DIR"
              echo "使用备用路径: $FIRMWARE_PATH"
            fi
          fi
          
          # 如果仍然未找到，使用通配符作为最后手段
          if [ -z "$FIRMWARE_PATH" ]; then
            echo "警告: 无法确定固件路径，使用通配符..."
            cd openwrt/bin/targets/*/*
          else
            cd "$FIRMWARE_PATH"
          fi
          
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "固件路径已设置为: $PWD"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
